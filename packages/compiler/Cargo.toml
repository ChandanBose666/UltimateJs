[package]
name = "compiler"
version = "0.1.5"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "blazefw-compiler"
path = "src/main.rs"

[dependencies]
swc_core = { version = "59.0.1", features = ["ecma_parser", "ecma_ast", "ecma_visit", "ecma_codegen", "__common"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
