[package]
name = "blazefw-crdt"
version = "0.1.5"
edition = "2021"
description = "Automerge CRDT document compiled to WebAssembly — the Zero-Fetch Sync engine for BlazeFW"
repository = "https://github.com/ChandanBose666/BlazeFW"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
automerge = { version = "0.8", features = ["wasm"] }
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
js-sys = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"
